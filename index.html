<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hanakotoba Quiz | ค้นหาดอกไม้ประจำตัว</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@300;500&family=Noto+Sans+Thai:wght@300;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #faf8f5; /* สีขาวนวลแบบกระดาษญี่ปุ่น */
            --text-color: #5d504a; /* สีน้ำตาลหม่นธรรมชาติ */
            --accent-color: #8e7d77;
            --accent-hover: #f4ece8;
            --font-main: 'Noto Sans Thai', 'Helvetica Neue', sans-serif;
            --font-jp: 'Noto Serif JP', serif;
        }
        body {
            font-family: var(--font-main);
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        #quiz-container {
            max-width: 500px;
            width: 100%;
            text-align: center;
            padding: 40px;
        }
        h1, h2 {
            font-family: var(--font-jp);
            font-weight: 300;
            margin-bottom: 30px;
        }
        .btn {
            display: block;
            width: 100%;
            padding: 15px;
            margin: 10px 0;
            background: transparent;
            color: var(--text-color);
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 16px;
            font-weight: 300;
            border: none;
        }
        .btn:hover {
            background-color: var(--accent-hover);
        }
        .btn-main {
            background-color: transparent;
            color: var(--accent-color);
            font-weight: 500;
        }
        .btn-main:hover {
            background-color: var(--accent-hover);
            color: var(--accent-color);
        }
        img { max-width: 100%; border-radius: 15px; margin: 20px 0; }
        .flower-circle {
            width: 200px;
            height: 200px;
            border-radius: 50%;
            object-fit: cover;
            border: 5px solid white;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }
        .hidden { display: none; }
        .result-info { text-align: left; background: transparent; padding: 20px 0; line-height: 1.8; font-weight: 300; }
        .progress { font-size: 12px; color: #a0908a; margin-bottom: 20px; font-weight: 300; }
        .ornament { font-size: 2em; color: var(--accent-color); margin-bottom: 20px; }
    </style>
</head>
<body>

<div id="quiz-container">
    <div id="start-page">
        <div class="ornament">🌸</div>
        <h1>Hanakotoba Quiz</h1>
        <p style="font-weight: 300;">ค้นหาดอกไม้ที่สะท้อนตัวตนของคุณ<br>ผ่านภาษาดอกไม้และวัฒนธรรมญี่ปุ่น</p>
        <button class="btn btn-main" onclick="startQuiz()">เริ่มทำแบบทดสอบ</button>
    </div>

    <div id="question-page" class="hidden">
        <div class="ornament">🌿</div>
        <div class="progress" id="progress-text">คำถามที่ 1 จาก 7</div>
        <h3 id="question-text" style="font-weight: 500; margin-bottom: 30px;">...</h3>
        <div id="options-container"></div>
    </div>

    <div id="result-page" class="hidden">
        <div class="ornament">🎋</div>
        <p style="margin-bottom: 5px; color: #8e7d77; font-weight: 300;">ผลลัพธ์ของคุณคือ</p>
        <h1 id="flower-name" style="margin-top: 0;">ชื่อดอกไม้</h1>
        <img id="flower-img" src="" alt="Flower result" class="flower-circle">
        <div class="result-info">
            <p><strong>ความหมาย:</strong> <span id="flower-meaning"></span></p>
            <p><strong>เกร็ดน่ารู้:</strong> <span id="flower-note"></span></p>
        </div>
        <hr style="border: 0; border-top: 1px solid #f4ece8; margin: 20px 0;">
        <h3 style="font-weight: 500;">ลองพับดอกไม้ของคุณดูไหม? ✨</h3>
        <a id="flower-video" href="#" target="_blank" class="btn btn-main" style="text-decoration: none;">วิดีโอสอนพับกระดาษ (Origami)</a>
        <button class="btn" onclick="location.reload()" style="font-size: 14px; color: #a0908a;">เริ่มใหม่</button>
    </div>
</div>

<script>
    const flowers = {
        Sakura: { 
            name: "ดอกซากุระ (Sakura, 桜)", 
            meaning: "ความงามของจิตวิญญาณ, ความงามของสตรี และการเริ่มต้นใหม่", 
            note: "เป็นดอกไม้ประจำชาติญี่ปุ่น ชื่อมาจากเทพธิดาซากุยะ และยังปรากฏบนธนบัตร 1,000 เยนกับเหรียญ 100 เยนด้วย", 
            img: "sakura.png", 
            video: "https://www.youtube.com/watch?v=halmrlPLJj0" 
        },
        Wisteria: { 
            name: "วิสทีเรีย (Wisteria / Fuji, 藤)", 
            meaning: "เมามายในความรักของคุณ, ใจดี และการต้อนรับ", 
            note: "ปรากฎอยู่ในตำนานเก่าแก่ของญี่ปุ่นอย่าง 'ตำนานเก็นจิ' และเป็นดอกไม้ที่ใช้ขับไล่อสูรในเรื่องดาบพิฆาตอสูร", 
            img: "fuji.png", 
            video: "https://www.youtube.com/shorts/ny7mo7mBkMU" 
        },
        Nemophila: { 
            name: "เนโมฟีล่า (Nemophila, ネモフィラ)", 
            meaning: "ประสบความสำเร็จในทุกที่, ความละเอียดอ่อน และการให้อภัย", 
            note: "สัญลักษณ์ของการไม่ยึดติดกับความงาม และเป็นดอกไม้ประจำตัวของผู้กล้าฮิมเมลจากเรื่อง Sousou no Frieren", 
            img: "nemophila.png", 
            video: "https://www.youtube.com/watch?v=nROfBlb4PIY" 
        },
        Nanohana: { 
            name: "นาโนะฮานะ (Nanohana, ナノハナ)", 
            meaning: "ความสุขเล็ก ๆ, ความมีชีวิตชีวา และความมั่งคั่ง", 
            note: "ชื่อมีความหมายตรงตัวว่า 'ดอกไม้ผัก' เพราะนิยมนำไปประกอบอาหารหรือทำน้ำมัน", 
            img: "nanohana.png", 
            video: "https://www.youtube.com/watch?v=A5USx5a2wio" 
        },
        Hydrangea: { 
            name: "ไฮเดรนเยีย (Hydrangea / Ajisai, アジサイ)", 
            meaning: "ความกลมกลืน, ความไม่แน่นอน และความไม่เที่ยงแท้", 
            note: "สีของดอกเปลี่ยนตามสภาพดิน สีน้ำเงินหมายถึงการขอโทษ แต่ต้องระวังเพราะมีพิษทั้งต้น", 
            img: "ajisai.png", 
            video: "https://www.youtube.com/shorts/P0JEqNPEut4" 
        },
        Gerbera: { 
            name: "เยอบีร่า (Gerbera, ガーべラ)", 
            meaning: "ก้าวไปข้างหน้าอยู่เสมอ และความหวัง", 
            note: "ก้านดอกจะเติบโตโดยเงยหน้าขึ้นเสมอ เป็นดอกไม้ที่เด็นจิมอบให้เรเซ่ใน Chainsaw Man", 
            img: "gerbera.png", 
            video: "https://www.youtube.com/watch?v=ST6TwpFHl-Q" 
        },
        Tsubaki: { 
            name: "สึบากิ (Camellia, ツバキ)", 
            meaning: "ความงดงามที่เรียบง่าย และความสมบูรณ์แบบ", 
            note: "ปรากฏในวรรณกรรมญี่ปุ่นมานานกว่าพันปี ปัจจุบันเป็นส่วนประกอบยอดนิยมในเครื่องสำอางญี่ปุ่น", 
            img: "tsubaki.png", 
            video: "https://www.youtube.com/watch?v=g1p58FSvsRY" 
        }
    };

    const questions = [
        { q: "เมื่อตื่นมาในเช้าวันหยุด คุณอยากทำอะไรที่สุด?", options: [{t:"ออกไปเดินเล่นหาของอร่อย", s:["Nanohana", "Gerbera"]}, {t:"นั่งจิบชาเงียบๆ อ่านหนังสือเล่มโปรด", s:["Tsubaki", "Nemophila"]}, {t:"เตรียมตัวออกไปทำกิจกรรมใหม่ๆ", s:["Sakura", "Gerbera"]}] },
        { q: "นิยาม 'ความสวยงาม' แบบที่คุณชอบที่สุดคือ?", options: [{t:"ความสวยที่เรียบง่าย ไม่ต้องแต่งเติม", s:["Tsubaki", "Nemophila"]}, {t:"ความงามที่มีความหมายลึกซึ้ง", s:["Sakura", "Hydrangea"]}, {t:"ความงามที่หรูหรา น่าหลงใหล", s:["Wisteria"]}] },
        { q: "เมื่อเจออุปสรรค คุณมักจะรับมืออย่างไร?", options: [{t:"ให้อภัยตัวเองและผู้อื่น", s:["Nemophila", "Hydrangea"]}, {t:"มองหาความหวังและก้าวต่อ", s:["Gerbera", "Nanohana"]}, {t:"ยอมรับความเปลี่ยนแปลงของชีวิต", s:["Hydrangea", "Sakura"]}] },
        { q: "ในงานสังสรรค์ คุณมักจะเป็นคนแบบไหน?", options: [{t:"คอยต้อนรับและดูแลผู้อื่น", s:["Wisteria", "Hydrangea"]}, {t:"เงียบๆ กับกลุ่มเพื่อนสนิท", s:["Tsubaki", "Nanohana"]}, {t:"สร้างพลังงานบวกและความสดใส", s:["Sakura", "Gerbera"]}] },
        { q: "ถ้าเลือกของขวัญให้ตัวเองได้ 1 อย่าง?", options: [{t:"โอกาสในการเริ่มต้นใหม่", s:["Sakura", "Gerbera"]}, {t:"ความสุขจากสิ่งเล็กๆ รอบตัว", s:["Nanohana", "Nemophila"]}, {t:"ความรักและการได้รับการยอมรับ", s:["Wisteria", "Hydrangea"]}] },
        { q: "เวลาที่มอง 'อนาคต' คุณมักจะนึกถึงอะไร?", options: [{t:"ความสำเร็จที่รออยู่ในทุกที่", s:["Nemophila", "Gerbera"]}, {t:"การเติบโตแบบเรียบง่ายและยั่งยืน", s:["Tsubaki", "Nanohana"]}, {t:"ความหวังที่ไม่สิ้นสุด", s:["Gerbera", "Sakura"]}] },
        { q: "หากเปรียบชีวิตเป็น 'ฤดูกาล' คุณชอบช่วงไหน?", options: [{t:"ฤดูใบไม้ผลิ: การเริ่มต้น", s:["Sakura", "Nanohana", "Wisteria"]}, {t:"ฤดูฝน: ความเย็นฉ่ำ", s:["Hydrangea"]}, {t:"ฤดูหนาว: ความสงบนิ่ง", s:["Tsubaki"]}] }
    ];

    let currentStep = 0;
    let scores = { Sakura:0, Wisteria:0, Nemophila:0, Nanohana:0, Hydrangea:0, Gerbera:0, Tsubaki:0 };

    function startQuiz() {
        document.getElementById('start-page').classList.add('hidden');
        document.getElementById('question-page').classList.remove('hidden');
        showQuestion();
    }

    function showQuestion() {
        if (currentStep >= questions.length) return showResult();
        const q = questions[currentStep];
        document.getElementById('progress-text').innerText = `คำถามที่ ${currentStep + 1} จาก ${questions.length}`;
        document.getElementById('question-text').innerText = q.q;
        const container = document.getElementById('options-container');
        container.innerHTML = '';
        q.options.forEach(opt => {
            const btn = document.createElement('button');
            btn.className = 'btn';
            btn.innerText = opt.t;
            btn.onclick = () => { opt.s.forEach(f => scores[f]++); currentStep++; showQuestion(); };
            container.appendChild(btn);
        });
    }

    function showResult() {
        document.getElementById('question-page').classList.add('hidden');
        document.getElementById('result-page').classList.remove('hidden');
        const topFlower = Object.keys(scores).reduce((a, b) => scores[a] > scores[b] ? a : b);
        const res = flowers[topFlower];
        document.getElementById('flower-name').innerText = res.name;
        document.getElementById('flower-meaning').innerText = res.meaning;
        document.getElementById('flower-note').innerText = res.note;
        document.getElementById('flower-img').src = res.img;
        document.getElementById('flower-video').href = res.video;
    }
</script>

</body>
</html>
