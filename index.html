<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hanakotoba Quiz | ค้นหาดอกไม้ประจำตัว</title>
    <style>
        :root {
            --bg-color: #fdfaf7;
            --text-color: #5d504a;
            --accent-color: #d3c4be;
            --card-bg: #ffffff;
            --primary-btn: #8e7d77;
        }
        body {
            font-family: 'Sarabun', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        #quiz-container {
            background: var(--card-bg);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.03);
            max-width: 550px;
            width: 100%;
            text-align: center;
        }
        .btn {
            display: block;
            width: 100%;
            padding: 14px;
            margin: 12px 0;
            border: 1px solid var(--accent-color);
            background: white;
            color: var(--text-color);
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 16px;
        }
        .btn:hover {
            background: #f4ece8;
            transform: translateY(-2px);
        }
        .btn-main {
            background: var(--primary-btn);
            color: white;
            border: none;
        }
        .btn-main:hover {
            background: #7a6a64;
            color: white;
        }
        img { max-width: 100%; border-radius: 15px; margin: 20px 0; border: 5px solid #fdfaf7; }
        .hidden { display: none; }
        .result-info { text-align: left; background: #faf8f6; padding: 20px; border-radius: 10px; margin: 20px 0; }
        .progress { font-size: 12px; color: #a0908a; margin-bottom: 10px; }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;500&display=swap" rel="stylesheet">
</head>
<body>

<div id="quiz-container">
    <div id="start-page">
        <h1 style="font-size: 2.5em;">🌸</h1>
        <h1>Hanakotoba Quiz</h1>
        <p>ค้นหาดอกไม้ที่สะท้อนตัวตนของคุณ<br>ผ่านภาษาดอกไม้และวัฒนธรรมญี่ปุ่น</p>
        <button class="btn btn-main" onclick="startQuiz()">เริ่มการเดินทาง</button>
    </div>

    <div id="question-page" class="hidden">
        <div class="progress" id="progress-text">คำถามที่ 1 จาก 7</div>
        <h3 id="question-text" style="margin-bottom: 25px;">...</h3>
        <div id="options-container"></div>
    </div>

    <div id="result-page" class="hidden">
        <p style="margin-bottom: 5px; color: #8e7d77;">ดอกไม้ของคุณคือ</p>
        <h1 id="flower-name" style="margin-top: 0;">ชื่อดอกไม้</h1>
        <img id="flower-img" src="" alt="flower result">
        <div class="result-info">
            <p><strong>ความหมาย (Hanakotoba):</strong> <span id="flower-meaning"></span> </p>
            <p><strong>เกร็ดน่ารู้:</strong> <span id="flower-note"></span> </p>
        </div>
        <hr style="border: 0.5px solid #eee; margin: 20px 0;">
        <h3 style="font-weight: 500;">ลองพับดอกไม้ของคุณดูไหม? ✨</h3>
        <a id="flower-video" href="#" target="_blank" class="btn btn-main" style="text-decoration: none;">ดูวิธีพับกระดาษ (Origami)</a>
        <button class="btn" onclick="location.reload()" style="font-size: 14px; border: none; color: #a0908a;">ทำแบบทดสอบใหม่</button>
    </div>
</div>

<script>
    const flowers = {
        Sakura: { name: "ดอกซากุระ (Sakura)", meaning: "ความงามของจิตวิญญาณ การเริ่มต้นใหม่", note: "ปรากฏอยู่บนธนบัตร 1,000 เยน และเป็นสัญลักษณ์ของการเริ่มปีการศึกษาใหม่ในญี่ปุ่น", img: "https://ohhotrip.com/wp-content/uploads/2018/02/sakura-1.jpg", video: "https://www.youtube.com/watch?v=halmrlPLJj0" },
        Wisteria: { name: "วิสทีเรีย (Fuji)", meaning: "ใจดี การต้อนรับ และ 'เมามายในความรักของคุณ'", note: "เป็นดอกไม้ขับไล่อสูรในเรื่องดาบพิฆาตอสูร และเคยปรากฏในตำนานเก็นจิ", img: "https://www.tsunagujapan.com/wp-content/uploads/2015/04/wisteria-1.jpg", video: "https://www.youtube.com/shorts/ny7mo7mBkMU" },
        Nemophila: { name: "เนโมฟีล่า (Nemophila)", meaning: "ประสบความสำเร็จในทุกที่ ความละเอียดอ่อน และการให้อภัย", note: "ดอกไม้ประจำตัวของผู้กล้าฮิมเมลจากเรื่อง Sousou no Frieren", img: "https://ohhotrip.com/wp-content/uploads/2018/02/nemophila-1.jpg", video: "https://www.youtube.com/watch?v=nROfBlb4PIY" },
        Nanohana: { name: "นาโนะฮานะ (Nanohana)", meaning: "ความสุขเล็ก ๆ ความมีชีวิตชีวา และความมั่งคั่ง", note: "ชื่อหมายถึง 'ดอกไม้ผัก' เพราะนำไปทำน้ำมันหรือประกอบอาหารได้", img: "https://insaitama.com/wp-content/uploads/2018/03/canola-flowers-saitama.jpg", video: "https://www.youtube.com/watch?v=A5USx5a2wio" },
        Hydrangea: { name: "ไฮเดรนเยีย (Ajisai)", meaning: "ความกลมกลืน แต่ก็แฝงด้วยความไม่แน่นอนตามสีที่เปลี่ยนไป", note: "นิยมให้เป็นของขวัญวันแม่ แต่ต้องระวังเพราะมีพิษทั้งต้น", img: "https://potico.co.th/cdn/shop/articles/hydrangea-meaning.jpg", video: "https://www.youtube.com/shorts/P0JEqNPEut4" },
        Gerbera: { name: "เยอบีร่า (Gerbera)", meaning: "ก้าวไปข้างหน้าอยู่เสมอ และความหวัง", note: "ใน Chainsaw Man เป็นดอกไม้ที่เด็นจิมอบให้เรเซ่ ก้านดอกมักจะเงยหน้าขึ้นเสมอ", img: "https://flowerconcierge.net/wp-content/uploads/2021/03/gerbera.jpg", video: "https://www.youtube.com/watch?v=ST6TwpFHl-Q" },
        Tsubaki: { name: "สึบากิ (Camellia)", meaning: "ความงดงามที่เรียบง่าย และความสมบูรณ์แบบ", note: "เวลาเหี่ยวส่วนหัวจะหักลงมา ทำให้ไม่นิยมให้คนป่วย แต่เป็นส่วนประกอบยอดนิยมในเครื่องสำอาง", img: "https://www.tsunagujapan.com/wp-content/uploads/2015/04/camellia-1.jpg", video: "https://www.youtube.com/watch?v=g1p58FSvsRY" }
    };

    const questions = [
        { q: "เมื่อตื่นมาในเช้าวันหยุดที่อากาศสดใส สิ่งแรกที่คุณอยากทำคือ?", options: [{t:"เดินเล่นหาของอร่อย", s:["Nanohana", "Gerbera"]}, {t:"จิบชาอ่านหนังสือเงียบๆ", s:["Tsubaki", "Nemophila"]}, {t:"ไปในที่ที่ไม่เคยไป", s:["Sakura", "Gerbera"]}] },
        { q: "หากต้องนิยาม 'ความสวยงาม' ในแบบที่คุณชอบที่สุด?", options: [{t:"ความสวยที่เรียบง่าย ไม่แต่งเติม", s:["Tsubaki", "Nemophila"]}, {t:"ความงามที่มีความหมายลึกซึ้ง", s:["Sakura", "Hydrangea"]}, {t:"ความงามที่หรูหรา น่าหลงใหล", s:["Wisteria"]}] },
        { q: "เมื่อเจออุปสรรคที่ทำให้รู้สึกแย่ คุณมักจะรับมืออย่างไร?", options: [{t:"ให้อภัยตัวเองและมองเป็นบทเรียน", s:["Nemophila", "Hydrangea"]}, {t:"มองหาความหวังและก้าวต่อไป", s:["Gerbera", "Nanohana"]}, {t:"ยอมรับความไม่แน่นอนของชีวิต", s:["Hydrangea", "Sakura"]}] },
        { q: "ในงานสังสรรค์ คุณมักจะเป็นคนแบบไหน?", options: [{t:"คอยต้อนรับและดูแลผู้อื่น", s:["Wisteria", "Hydrangea"]}, {t:"เงียบๆ กับกลุ่มเพื่อนสนิท", s:["Tsubaki", "Nanohana"]}, {t:"สร้างพลังงานบวกและความสดใส", s:["Sakura", "Gerbera"]}] },
        { q: "ถ้าเลือกของขวัญให้ตัวเองได้ 1 อย่าง คุณจะเลือกอะไร?", options: [{t:"โอกาสในการเริ่มต้นสิ่งใหม่", s:["Sakura", "Gerbera"]}, {t:"ความสงบและความสุขเล็กๆ", s:["Nanohana", "Nemophila"]}, {t:"ความรักและการได้รับการยอมรับ", s:["Wisteria", "Hydrangea"]}] },
        { q: "เวลาที่คุณมอง 'อนาคต' คุณมักจะนึกถึงสิ่งใด?", options: [{t:"ความสำเร็จที่รออยู่ในทุกที่", s:["Nemophila", "Gerbera"]}, {t:"การเติบโตแบบเรียบง่ายและยั่งยืน", s:["Tsubaki", "Nanohana"]}, {t:"ความหวังที่ไม่มีวันสิ้นสุด", s:["Gerbera", "Sakura"]}] },
        { q: "หากเปรียบชีวิตเป็น 'ฤดูกาล' คุณชอบช่วงเวลาไหนที่สุด?", options: [{t:"ฤดูใบไม้ผลิ: การเริ่มต้น", s:["Sakura", "Nanohana", "Wisteria"]}, {t:"ฤดูฝน: การเปลี่ยนแปลง", s:["Hydrangea"]}, {t:"ฤดูหนาว: ความสงบนิ่ง", s:["Tsubaki"]}] }
    ];

    let currentStep = 0;
    let scores = { Sakura:0, Wisteria:0, Nemophila:0, Nanohana:0, Hydrangea:0, Gerbera:0, Tsubaki:0 };

    function startQuiz() {
        document.getElementById('start-page').classList.add('hidden');
        document.getElementById('question-page').classList.remove('hidden');
        showQuestion();
    }

    function showQuestion() {
        if (currentStep >= questions.length) return showResult();
        const q = questions[currentStep];
        document.getElementById('progress-text').innerText = `คำถามที่ ${currentStep + 1} จาก ${questions.length}`;
        document.getElementById('question-text').innerText = q.q;
        const container = document.getElementById('options-container');
        container.innerHTML = '';
        q.options.forEach(opt => {
            const btn = document.createElement('button');
            btn.className = 'btn';
            btn.innerText = opt.t;
            btn.onclick = () => { opt.s.forEach(f => scores[f]++); currentStep++; showQuestion(); };
            container.appendChild(btn);
        });
    }

    function showResult() {
        document.getElementById('question-page').classList.add('hidden');
        document.getElementById('result-page').classList.remove('hidden');
        const topFlower = Object.keys(scores).reduce((a, b) => scores[a] > scores[b] ? a : b);
        const res = flowers[topFlower];
        document.getElementById('flower-name').innerText = res.name;
        document.getElementById('flower-meaning').innerText = res.meaning;
        document.getElementById('flower-note').innerText = res.note;
        document.getElementById('flower-img').src = res.img;
        document.getElementById('flower-video').href = res.video;
    }
</script>

</body>
</html>
