<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hanakotoba Quiz | ค้นหาดอกไม้ประจำตัว</title>
    <style>
        :root {
            --bg-color: #fdfaf7;
            --text-color: #5d504a;
            --accent-color: #d3c4be;
            --card-bg: #ffffff;
            --primary-btn: #8e7d77;
        }
        body {
            font-family: 'Sarabun', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        #quiz-container {
            background: var(--card-bg);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.03);
            max-width: 550px;
            width: 100%;
            text-align: center;
        }
        .btn {
            display: block;
            width: 100%;
            padding: 14px;
            margin: 12px 0;
            border: 1px solid var(--accent-color);
            background: white;
            color: var(--text-color);
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 16px;
        }
        .btn:hover {
            background: #f4ece8;
            transform: translateY(-2px);
        }
        .btn-main {
            background: var(--primary-btn);
            color: white;
            border: none;
        }
        .btn-main:hover {
            background: #7a6a64;
        }
        img { max-width: 100%; border-radius: 15px; margin: 20px 0; border: 2px solid #eee; }
        .hidden { display: none; }
        .result-info { text-align: left; background: #faf8f6; padding: 20px; border-radius: 10px; margin: 20px 0; line-height: 1.6; }
        .progress { font-size: 12px; color: #a0908a; margin-bottom: 10px; }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;500&display=swap" rel="stylesheet">
</head>
<body>

<div id="quiz-container">
    <div id="start-page">
        <h1 style="font-size: 2.5em;">🌸</h1>
        <h1>Hanakotoba Quiz</h1>
        <p>ตัวตนของคุณเปรียบได้กับดอกไม้ชนิดไหน?<br>มาค้นหาคำตอบผ่านภาษาดอกไม้ญี่ปุ่นกัน</p>
        <button class="btn btn-main" onclick="startQuiz()">เริ่มทำแบบทดสอบ</button>
    </div>

    <div id="question-page" class="hidden">
        <div class="progress" id="progress-text">คำถามที่ 1 จาก 7</div>
        <h3 id="question-text" style="margin-bottom: 25px;">...</h3>
        <div id="options-container"></div>
    </div>

    <div id="result-page" class="hidden">
        <p style="margin-bottom: 5px; color: #8e7d77;">ผลลัพธ์ของคุณคือ</p>
        <h1 id="flower-name" style="margin-top: 0;">ชื่อดอกไม้</h1>
        <img id="flower-img" src="" alt="Flower result">
        <div class="result-info">

            <p><strong>เกร็ดน่ารู้:</strong> <span id="flower-note"></span></p>
        </div>
        <hr style="border: 0.5px solid #eee; margin: 20px 0;">
        <h3 style="font-weight: 500;">ลองพับดอกไม้ของคุณดูไหม? ✨</h3>
        <a id="flower-video" href="#" target="_blank" class="btn btn-main" style="text-decoration: none;">วิดีโอสอนพับกระดาษ (Origami)</a>
        <button class="btn" onclick="location.reload()" style="font-size: 14px; border: none; color: #a0908a;">เริ่มใหม่</button>
    </div>
</div>
