<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hanakotoba Quiz | ค้นหาดอกไม้ประจำตัวคุณ</title>
    <style>
        /* --- 16personalities Style Palette --- */
        :root {
            --bg-color: #ffffff; /* พื้นหลังขาวสะอาด */
            --text-main: #333a56; /* สีตัวอักษรหลัก (น้ำเงินเข้มหม่น) */
            --text-secondary: #5a668f; /* สีตัวอักษรรอง */
            --primary-blue: #32a1fe; /* สีฟ้าสด (เหมือนปุ่มหลักของเขา) */
            --primary-hover: #1e8ae3; /* สีฟ้าเข้มเวลา Hover */
            --grey-light: #f6f8fa; /* สีพื้นหลังรอง */
            --border-color: #e6e9ef;
            --shadow-light: 0 4px 6px rgba(51, 58, 86, 0.05);
            
            /* Typography */
            --font-head: 'Georgia', 'serif'; /* ฟอนต์หัวข้อสไตล์ Serif */
            --font-body: 'Muli', 'Sarabun', 'sans-serif'; /* ฟอนต์เนื้อหาสะอาดตา */
        }

        body {
            font-family: var(--font-body);
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* --- Progress Bar ด้านบนสุด --- */
        #progress-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 6px;
            background-color: var(--grey-light);
            z-index: 1000;
        }
        #progress-bar {
            height: 100%;
            width: 0%;
            background-color: var(--primary-blue);
            transition: width 0.4s ease;
        }

        /* --- Main Container --- */
        #quiz-container {
            max-width: 800px;
            width: 90%;
            margin: 100px auto; /* เว้นระยะจาก Progress Bar */
            padding: 40px;
            text-align: center;
        }

        /* Typography Styles */
        h1 { font-family: var(--font-head); font-size: 2.8em; color: var(--text-main); margin-bottom: 10px; }
        h2 { font-family: var(--font-head); font-size: 2em; color: var(--primary-blue); margin-top: 0; }
        h3 { font-size: 1.5em; color: var(--text-main); font-weight: 500; margin-bottom: 30px; }
        p { font-size: 1.1em; color: var(--text-secondary); line-height: 1.7; }

        /* --- Button Styles --- */
        .btn {
            display: inline-block;
            padding: 18px 40px;
            margin: 10px 0;
            border-radius: 8px; /* ขอบโค้งน้อยๆ */
            font-size: 1.1em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            width: 100%; /* กว้างเต็มพื้นที่ */
            box-sizing: border-box;
        }

        /* ปุ่มคำตอบในแบบทดสอบ (เหมือนการ์ด) */
        .btn-option {
            background-color: var(--bg-color);
            color: var(--text-main);
            border: 2px solid var(--border-color);
            box-shadow: var(--shadow-light);
        }
        .btn-option:hover {
            border-color: var(--primary-blue);
            background-color: var(--grey-light);
            transform: translateY(-2px);
        }

        /* ปุ่มหลัก (เช่น "เริ่ม" หรือ "ดูวิธีพับ") */
        .btn-main {
            background-color: var(--primary-blue);
            color: white;
            border: none;
        }
        .btn-main:hover {
            background-color: var(--primary-hover);
            box-shadow: 0 6px 15px rgba(50, 161, 254, 0.3);
        }

        /* --- Results Page Layout --- */
        #result-page { display: flex; flex-direction: column; align-items: center; }
        #flower-img { max-width: 400px; width: 100%; border-radius: 12px; margin: 30px 0; box-shadow: 0 10px 20px rgba(0,0,0,0.08); }
        
        .result-section {
            text-align: left;
            background-color: var(--grey-light);
            padding: 30px;
            border-radius: 12px;
            width: 100%;
            margin-bottom: 20px;
            border: 1px solid var(--border-color);
        }
        .section-title { font-weight: 700; color: var(--primary-blue); margin-bottom: 10px; display: block; }
        
        .hidden { display: none; }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Muli:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>

<div id="progress-container">
    <div id="progress-bar"></div>
</div>

<div id="quiz-container">
    <div id="start-page">
        <h1>Hanakotoba Quiz</h1>
        <p>ตัวตนของคุณเหมือนกับดอกไม้ชนิดไหนในญี่ปุ่น?<br>มาค้นหาคำตอบผ่านภาษาดอกไม้และวัฒนธรรมญี่ปุ่นกัน</p>
        <button class="btn btn-main" onclick="startQuiz()" style="margin-top: 30px;">เริ่มทำแบบทดสอบ</button>
    </div>

    <div id="question-page" class="hidden">
        <h3 id="question-text">...</h3>
        <div id="options-container"></div>
    </div>

    <div id="result-page" class="hidden">
        <p style="color: var(--text-secondary); margin-bottom: 5px;">ดอกไม้ประจำตัวคุณคือ</p>
        <h1 id="flower-name" style="margin-top: 0;">ชื่อดอกไม้</h1>
        <img id="flower-img" src="" alt="Flower result">
        
        <div class="result-section">
            <span class="section-title">ความหมาย (Hanakotoba)</span>
            <p id="flower-meaning" style="color: var(--text-main);"></p>
        </div>
        
        <div class="result-section">
            <span class="section-title">เกร็ดน่ารู้</span>
            <p id="flower-note" style="color: var(--text-main);"></p>
        </div>
        
        <hr style="width: 100%; border: 0.5px solid var(--border-color); margin: 30px 0;">
        
        <a id="flower-video" href="#" target="_blank" class="btn btn-main" style="text-decoration: none;">วิดีโอสอนพับกระดาษ (Origami)</a>
        <button class="btn" onclick="location.reload()" style="font-size: 14px; color: var(--text-secondary); border: none; background: none; text-decoration: underline;">ทำแบบทดสอบใหม่</button>
    </div>
</div>

<script>
    // --- 1. ข้อมูลดอกไม้ (ครบทั้ง 7 ชนิด) ---
    const flowers = {
        Sakura: { name: "ดอกซากุระ (Sakura, 桜)", meaning: "ความงามของจิตวิญญาณ, ความงามของสตรี และการเริ่มต้นใหม่", note: "เป็นดอกไม้ประจำชาติญี่ปุ่น ชื่อมาจากเทพธิดาซากุยะ ปรากฏอยู่บนธนบัตร 1,000 เยน และเหรียญ 100 เยน", img: "sakura.png", video: "https://www.youtube.com/watch?v=halmrlPLJj0" },
        Wisteria: { name: "วิสทีเรีย (Fuji, 藤)", meaning: "เมามายในความรักของคุณ, ใจดี และการต้อนรับ", note: "ปรากฎอยู่ในตำนาน قدیمیของญี่ปุ่นอย่าง 'ตำนานเก็นจิ' และเป็นดอกไม้ที่ใช้ขับไล่อสูรในเรื่องดาบพิฆาตอสูร", img: "fuji.png", video: "https://www.youtube.com/shorts/ny7mo7mBkMU" },
        Nemophila: { name: "เนโมฟีล่า (Nemophila)", meaning: "ประสบความสำเร็จในทุกที่, ความละเอียดอ่อน และการให้อภัย", note: "สัญลักษณ์ของการไม่ยึดติดกับความงาม และเป็นดอกไม้ประจำตัวของผู้กล้าฮิมเมลจากเรื่อง Sousou no Frieren", img: "nemophila.png", video: "https://www.youtube.com/watch?v=nROfBlb4PIY" },
        Nanohana: { name: "นาโนะฮานะ (Nanohana)", meaning: "ความสุขเล็ก ๆ, ความมีชีวิตชีวา และความมั่งคั่ง", note: "ชื่อมีความหมายตรงตัวว่า 'ดอกไม้ผัก' นิยมนำไปประกอบอาหารหรือทำน้ำมัน", img: "nanohana.png", video: "https://www.youtube.com/watch?v=A5USx5a2wio" },
        Hydrangea: { name: "ไฮเดรนเยีย (Ajisai, アジไซ)", meaning: "ความกลมกลืน, ความไม่แน่นอน และความไม่เที่ยงแท้", note: "สีของดอกเปลี่ยนตามสภาพดิน สีน้ำเงินหมายถึงการขอโทษ แต่ต้องระวังเพราะมีพิษทั้งต้น", img: "ajisai.png", video: "https://www.youtube.com/shorts/P0JEqNPEut4" },
        Gerbera: { name: "เยอบีร่า (Gerbera)", meaning: "ก้าวไปข้างหน้าอยู่เสมอ และความหวัง", note: "ก้านดอกจะเติบโตโดยเงยหน้าขึ้นเสมอ ปรากฏใน Chainsaw Man", img: "gerbera.png", video: "https://www.youtube.com/watch?v=ST6TwpFHl-Q" },
        Tsubaki: { name: "สึบากิ (Camellia, ツバキ)", meaning: "ความงดงามที่เรียบง่าย และความสมบูรณ์แบบ", note: "เวลาเหี่ยวส่วนหัวจะหักลงมา ปรากฏในวรรณกรรมญี่ปุ่นมานานกว่าพันปี", img: "tsubaki.png", video: "https://www.youtube.com/watch?v=g1p58FSvsRY" }
    };

    // --- 2. ข้อมูลคำถาม (7 ข้อ) ---
    const questions = [
        { q: "เมื่อคุณตื่นมาในเช้าวันหยุด สิ่งแรกที่คุณอยากทำคือ?", options: [{t:"ออกไปเดินเล่นหาของอร่อย", s:["Nanohana", "Gerbera"]}, {t:"นั่งจิบชาอ่านหนังสือเงียบๆ", s:["Tsubaki", "Nemophila"]}, {t:"ไปในที่ที่ไม่เคยไป", s:["Sakura", "Gerbera"]}] },
        { q: "นิยาม 'ความสวยงาม' แบบที่คุณชอบที่สุดคือ?", options: [{t:"ความสวยที่เรียบง่าย", s:["Tsubaki", "Nemophila"]}, {t:"ความงามที่มีความหมายลึกซึ้ง", s:["Sakura", "Hydrangea"]}, {t:"ความงามที่หรูหรา น่าหลงใหล", s:["Wisteria"]}] },
        { q: "เมื่อเจออุปสรรคที่ทำให้รู้สึกแย่ คุณมักจะรับมืออย่างไร?", options: [{t:"ให้อภัยตัวเองและผู้อื่น", s:["Nemophila", "Hydrangea"]}, {t:"มองหาความหวังและก้าวต่อ", s:["Gerbera", "Nanohana"]}, {t:"ยอมรับความเปลี่ยนแปลงของชีวิต", s:["Hydrangea", "Sakura"]}] },
        { q: "ในงานสังสรรค์ คุณมักจะเป็นคนแบบไหน?", options: [{t:"คอยต้อนรับและดูแลผู้อื่น", s:["Wisteria", "Hydrangea"]}, {t:"เงียบๆ กับกลุ่มเพื่อนสนิท", s:["Tsubaki", "Nanohana"]}, {t:"สร้างพลังงานบวก", s:["Sakura", "Gerbera"]}] },
        { q: "ถ้าเลือกของขวัญให้ตัวเองได้ 1 อย่าง คุณจะเลือกอะไร?", options: [{t:"โอกาสในการเริ่มต้นสิ่งใหม่", s:["Sakura", "Gerbera"]}, {t:"ความสุขเล็กๆ รอบตัว", s:["Nanohana", "Nemophila"]}, {t:"ความรักและการได้รับการยอมรับ", s:["Wisteria", "Hydrangea"]}] },
        { q: "เวลาที่คุณมอง 'อนาคต' คุณมักจะนึกถึงอะไร?", options: [{t:"ความสำเร็จที่รออยู่ในทุกที่", s:["Nemophila", "Gerbera"]}, {t:"การเติบโตแบบเรียบง่ายและยั่งยืน", s:["Tsubaki", "Nanohana"]}, {t:"ความหวังที่ไม่สิ้นสุด", s:["Gerbera", "Sakura"]}] },
        { q: "หากเปรียบชีวิตเป็น 'ฤดูกาล' คุณชอบช่วงไหนที่สุด?", options: [{t:"ฤดูใบไม้ผลิ: การเริ่มต้น", s:["Sakura", "Nanohana", "Wisteria"]}, {t:"ฤดูฝน: ความเย็นฉ่ำ", s:["Hydrangea"]}, {t:"ฤดูหนาว: ความสงบนิ่ง", s:["Tsubaki"]}] }
    ];

    let currentStep = 0;
    let scores = { Sakura:0, Wisteria:0, Nemophila:0, Nanohana:0, Hydrangea:0, Gerbera:0, Tsubaki:0 };

    // --- 3. JavaScript Logic (Smooth Progress) ---
    function startQuiz() {
        document.getElementById('start-page').classList.add('hidden');
        document.getElementById('question-page').classList.remove('hidden');
        updateProgress();
        showQuestion();
    }

    function showQuestion() {
        if (currentStep >= questions.length) return showResult();
        const q = questions[currentStep];
        document.getElementById('question-text').innerText = q.q;
        const container = document.getElementById('options-container');
        container.innerHTML = '';
        q.options.forEach(opt => {
            const btn = document.createElement('button');
            btn.className = 'btn btn-option'; // ใช้สไตล์ปุ่มคำตอบ
            btn.innerText = opt.t;
            btn.onclick = () => { opt.s.forEach(f => scores[f]++); currentStep++; updateProgress(); showQuestion(); };
            container.appendChild(btn);
        });
    }

    function updateProgress() {
        const percentage = (currentStep / questions.length) * 100;
        document.getElementById('progress-bar').style.width = percentage + '%';
    }

    function showResult() {
        document.getElementById('question-page').classList.add('hidden');
        document.getElementById('result-page').classList.remove('hidden');
        // ค้นหาดอกไม้ที่มีคะแนนสูงสุด
        const topFlower = Object.keys(scores).reduce((a, b) => scores[a] > scores[b] ? a : b);
        const res = flowers[topFlower];
        // แสดงผล
        document.getElementById('flower-name').innerText = res.name;
        document.getElementById('flower-meaning').innerText = res.meaning;
        document.getElementById('flower-note').innerText = res.note;
        document.getElementById('flower-img').src = res.img;
        document.getElementById('flower-video').href = res.video;
    }
</script>

</body>
</html>
